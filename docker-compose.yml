services:
  api:
    build: .
    ports:
      - "3000:8080"
    env_file:
      - .env.docker
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"   # host:container (avoids clashing with your local 27017)
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
